function Hero({tweaks,lang}) {
  const t=T[lang];
  const [ri,setRi]=useState(0);
  const [typed,setTyped]=useState('');
  const [del,setDel]=useState(false);
  useEffect(()=>{
    const role=t.roles[ri];let tm;
    if(!del&&typed.length<role.length)tm=setTimeout(()=>setTyped(role.slice(0,typed.length+1)),60);
    else if(!del&&typed.length===role.length)tm=setTimeout(()=>setDel(true),1800);
    else if(del&&typed.length>0)tm=setTimeout(()=>setTyped(typed.slice(0,-1)),35);
    else if(del&&typed.length===0){setDel(false);setRi(i=>(i+1)%t.roles.length);}
    return()=>clearTimeout(tm);

        </h1>
        <div style={{fontFamily:'var(--mono)',fontSize:'clamp(16px,2.2vw,22px)',color:'var(--muted)',marginBottom:28,minHeight:34}}>
          {typed}<span style={{animation:'blink 1s step-end infinite',color:tweaks.accent}}>|</span>
        </div>
        <p className="hero-bio" style={{fontSize:16,lineHeight:1.8,color:'#94a3b8',maxWidth:560,margin:'0 auto 40px',textWrap:'pretty'}}>{t.bio}</p>

        {/* Metrics */}

// ── Projects ──────────────────────────────────────────────────────────────
function Projects({tweaks,lang}) {
  const t=T[lang];
  const [filter,setFilter]=useState('all');
  const cats=[...new Set(DATA.projects.map(p=>p.category))];
  const visible=filter==='all'?DATA.projects:DATA.projects.filter(p=>p.category===filter);
  return (
    <section id="projects" data-screen-label="Proyectos" style={{padding:'100px 10vw',borderTop:`1px solid ${tweaks.accent}18`}}>
      <CenteredTitle accent={tweaks.accent} title={t.projects_title}/>
      <div style={{display:'flex',gap:8,marginBottom:40,justifyContent:'center',flexWrap:'wrap'}}>
        {[{k:'all',l:t.all},...cats.map(c=>({k:c,l:c}))].map(c=>(
          <button key={c.k} onClick={()=>setFilter(c.k)} style={{padding:'6px 18px',borderRadius:999,border:`1px solid ${filter===c.k?tweaks.accent:tweaks.accent+'33'}`,background:filter===c.k?`${tweaks.accent}18`:'transparent',color:filter===c.k?tweaks.accent:'var(--muted)',fontFamily:'var(--mono)',fontSize:12,cursor:'pointer',transition:'all .2s'}}>{c.l}</button>
        ))}
      </div>
      <div className="projects-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:18,maxWidth:1100,margin:'0 auto'}}>
        {visible.map(p=><ProjCard key={p.id} p={p} tweaks={tweaks} see={t.see} lang={lang}/>)}
      </div>
    </section>
  );
}

function ProjCard({p,tweaks,see,lang}) {
  const slug = p.title
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
  const [h,setH]=useState(false);const cc=catColors[p.category]||tweaks.accent;
  const cardTitle=lang==='en'?(p.title_en||p.title):p.title;
  const cardDesc=lang==='en'?(p.desc_en||p.desc):p.desc;
  return (
    <a href={`/${slug}`} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{display:'block',textDecoration:'none',color:'inherit',background:h?'var(--bg4)':'var(--bg3)',border:`1px solid ${h?cc+'55':'var(--border)'}`,borderRadius:14,padding:'24px',transition:'all .25s',transform:h?'translateY(-4px)':'none',boxShadow:h?`0 12px 40px ${cc}18`:'none',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${cc},${cc}44)`,borderRadius:'14px 14px 0 0'}}/>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
        <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 9px',background:`${cc}18`,color:cc,borderRadius:999,border:`1px solid ${cc}33`}}>{p.category}</span>
        <span style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}><span style={{width:5,height:5,borderRadius:'50%',background:statusColors[p.status]||tweaks.accent}}/>{p.status}</span>
      </div>
      {p.image && <div style={{width:'100%',aspectRatio:'16/9',marginBottom:12,borderRadius:10,overflow:'hidden',border:`1px solid ${cc}22`,background:'var(--bg2)'}}>
        <img src={p.image} alt={p.title} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
      </div>}
      <h3 style={{fontSize:16,fontWeight:600,marginBottom:8,lineHeight:1.3}}>{cardTitle}</h3>
      <p style={{fontSize:12,color:'#94a3b8',lineHeight:1.65,marginBottom:16,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{cardDesc}</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:16}}>
        {p.tags.slice(0,4).map(t=><span key={t} style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 7px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--muted)'}}>{t}</span>)}
        {p.tags.length>4&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)'}}>+{p.tags.length-4}</span>}
      </div>
      <div style={{fontSize:12,color:cc,fontWeight:500}}>{see}</div>
    </a>
  );
}

// ── Contact ───────────────────────────────────────────────────────────────

  const inp={width:'100%',padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontFamily:'var(--font)',fontSize:14,outline:'none',transition:'border-color .2s'};

    <section id="contact" data-screen-label="Contacto" style={{padding:'100px 10vw 120px',borderTop:`1px solid ${tweaks.accent}18`}}>
      <CenteredTitle accent={tweaks.accent} title={t.contact_title}/>
      <div className="contact-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:48,maxWidth:900,margin:'0 auto'}}>
        <div>
          <h3 style={{fontSize:24,fontWeight:700,marginBottom:12,lineHeight:1.3}}>{t.contact_sub} <span style={{color:tweaks.accent}}>🤝</span></h3>
          <p style={{fontSize:14,color:'#94a3b8',lineHeight:1.75,marginBottom:26,textWrap:'pretty'}}>{t.contact_desc}</p>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {[
              {l:'Email',v:DATA.email,h:`mailto:${DATA.email}`},
              {l:'WhatsApp',v:DATA.phone,h:DATA.whatsapp},
              {l:'LinkedIn',v:'linkedin.com/in/ernesto-saniel-castro-lozano-96ba2b268',h:DATA.linkedin},
              {l:'GitHub',v:'github.com/ErnestoSCL',h:DATA.github},
              {l:'Instagram',v:'@lozano_sann',h:DATA.instagram},
            ].map(item=>(
              <a key={item.l} href={item.h} target="_blank" rel="noopener noreferrer"
                style={{display:'flex',gap:12,alignItems:'center',padding:'11px 16px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:10,transition:'all .2s'}}

               <span style={{fontSize:12,color:'#94a3b8'}}>{item.v}</span>

          </div>
        </div>
        {sent?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',justifyContent:'center',gap:10}}>
            <div style={{width:52,height:52,borderRadius:'50%',background:`${tweaks.accent}18`,display:'flex',alignItems:'center',justifyContent:'center',color:tweaks.accent,fontSize:22}}>✓</div>
            <h3 style={{fontSize:20,fontWeight:600,color:tweaks.accent}}>{t.sent_title}</h3>
            <p style={{color:'#94a3b8',fontSize:14}}>{t.sent_sub}</p>
          </div>
        ):(
          <form onSubmit={e=>{e.preventDefault();setSent(true);}} style={{display:'flex',flexDirection:'column',gap:14}}>
            {[{k:'name',l:t.name_lbl,tp:'text'},{k:'email',l:t.email_lbl,tp:'email'}].map(f=>(
              <div key={f.k}><label style={{display:'block',fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',marginBottom:5,letterSpacing:'.06em'}}>{f.l.toUpperCase()}</label>
                <input type={f.tp} required value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} style={inp}
                  onFocus={e=>e.target.style.borderColor=tweaks.accent+'66'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
              </div>
            ))}
            <div><label style={{display:'block',fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',marginBottom:5,letterSpacing:'.06em'}}>{t.msg_lbl.toUpperCase()}</label>
              <textarea required rows={5} value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} style={{...inp,resize:'vertical'}}
                onFocus={e=>e.target.style.borderColor=tweaks.accent+'66'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            </div>
            <button type="submit" style={{padding:'11px 28px',background:tweaks.accent,color:'#07090f',border:'none',borderRadius:999,fontFamily:'var(--font)',fontWeight:700,fontSize:14,cursor:'pointer',alignSelf:'flex-start',transition:'all .2s'}}
              onMouseEnter={e=>{e.currentTarget.style.opacity='.85';e.currentTarget.style.transform='translateY(-1px)';}} onMouseLeave={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='none';}}>{t.send}</button>
          </form>
        )}
      </div>

}

function Footer({tweaks,lang}) {
  return <footer style={{padding:'20px 10vw',borderTop:`1px solid ${tweaks.accent}18`,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
    <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)'}}>© 2026 {tweaks.name}</span>
    <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)'}}>Data Science & ML Engineering</span>

}

// ── Tweaks ────────────────────────────────────────────────────────────────
function TweaksPanel({tweaks,setTweaks,visible}) {
  if(!visible)return null;
  const up=(k,v)=>setTweaks(p=>{const n={...p,[k]:v};window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');return n;});
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'var(--bg3)',border:'1px solid rgba(0,229,255,.3)',borderRadius:14,padding:'20px 24px',minWidth:270,boxShadow:'0 8px 40px rgba(0,0,0,.6)'}}>
      <div style={{fontSize:13,fontWeight:600,color:'var(--accent)',marginBottom:14}}>Tweaks</div>
      {[{k:'name',l:'Nombre'},{k:'role',l:'Rol'}].map(f=>(
        <div key={f.k} style={{marginBottom:10}}>
          <label style={{fontSize:10,color:'var(--muted)',display:'block',marginBottom:3}}>{f.l}</label>
          <input value={tweaks[f.k]} onChange={e=>up(f.k,e.target.value)} style={{width:'100%',padding:'5px 9px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontFamily:'var(--font)',fontSize:12}}/>
        </div>
      ))}
      <div><label style={{fontSize:10,color:'var(--muted)',display:'block',marginBottom:5}}>Color Acento</label>
        <div style={{display:'flex',gap:7}}>
          {['#00e5ff','#10b981','#7c3aed','#f59e0b','#f43f5e'].map(c=>(
            <div key={c} onClick={()=>up('accent',c)} style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:tweaks.accent===c?'2px solid white':'2px solid transparent',transition:'border .15s'}}/>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function CenteredTitle({accent,title}){return(
  <div style={{textAlign:'center',marginBottom:52}}>
    <h2 style={{fontSize:'clamp(26px,4vw,42px)',fontWeight:700,color:accent,letterSpacing:'-.02em'}}>{title}</h2>
    <div style={{width:56,height:3,background:accent,borderRadius:2,margin:'12px auto 0'}}/>
  </div>
);}

function App() {
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [open,setOpen]=useState(false);
  const [lang,setLang]=useState(()=>localStorage.getItem('portfolio_lang')==='en'?'en':'es');
  useEffect(()=>{document.documentElement.style.setProperty('--accent',tweaks.accent);},[tweaks.accent]);
  useEffect(()=>{document.documentElement.lang=lang;},[lang]);
  useEffect(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode')setOpen(true);if(e.data?.type==='__deactivate_edit_mode')setOpen(false);};
    window.addEventListener('message',h);window.parent.postMessage({type:'__edit_mode_available'},'*');return()=>window.removeEventListener('message',h);
  },[]);
  return <>
    <Nav tweaks={tweaks} lang={lang} setLang={setLang}/>
    <Hero tweaks={tweaks} lang={lang}/>
    <About tweaks={tweaks} lang={lang}/>
    <Skills tweaks={tweaks} lang={lang}/>
    <Services tweaks={tweaks} lang={lang}/>
    <Certs tweaks={tweaks} lang={lang}/>
    <Projects tweaks={tweaks} lang={lang}/>
    <Contact tweaks={tweaks} lang={lang}/>
    <Footer tweaks={tweaks} lang={lang}/>
    <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={open}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
